apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs-init
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tdwio/infra-argocd-tmp
    targetRevision: HEAD
    path: kubernetes/manifests/rustfs-init
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: s3
  syncPolicy:
    automated:
      prune: true
      selfHeal: false