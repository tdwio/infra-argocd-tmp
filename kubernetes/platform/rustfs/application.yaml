apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.rustfs.com/
    chart: rustfs
    targetRevision: 0.0.95
    helm:
      values: |
        image:
          rustfs:
            tag: "1.0.0-alpha.95"

        replicaCount: 1
        mode:
          standalone:
            enabled: true
          distributed:
            enabled: false

        secret:
          existingSecret: s3-credentials

        ingress:
          enabled: false

        storageclass:
          name: local-path
          dataStorageSize: 16Gi
          logStorageSize: 1Gi

        # TODO OTEL
        # Ref. https://github.com/rustfs/rustfs/blob/main/helm/rustfs/values.yaml
        obs_endpoint:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: s3
  syncPolicy:
    automated:
      prune: true
      selfHeal: true