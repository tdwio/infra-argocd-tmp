apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: valkey
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/valkey-io/valkey-helm/valkey
    targetRevision: 0.9.4
    path: .
    helm:
      values: |
        image:
          tag: 9.0.3-alpine3.23
        
        replica:
          enabled: true
          replicas: 2
          
          persistence:
            size: 1Gi
            storageClass: local-path
            accessModes:
              - ReadWriteOnce
              
        metrics:
          enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: valkey-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true